---
RecipeFormatVersion: "2020-01-25"
ComponentName: "com.mbreissi.modbus.ModbusAdapter"
ComponentVersion: "1.0.0"
ComponentDescription: "Modbus -> Greengrass southbound adapter (pymodbus); the Python reference adapter"
ComponentPublisher: "Marc Breissinger"
ComponentDependencies:
  aws.greengrass.TokenExchangeService:
    VersionRequirement: ">=2.0.0"
    DependencyType: "HARD"
ComponentConfiguration:
  DefaultConfiguration:
    ComponentConfig:
      logging:
        level: "INFO"
        python_format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
      # UNS state keepalive (ecv1/{device}/ModbusAdapter/main/state) + system 'sys' measures.
      heartbeat:
        intervalSecs: 5
        measures:
          cpu: true
          memory: true
          disk: false
      tags: {}
      # Optional UNS enterprise-hierarchy placement. Absent => the zero-config default ["device"] and
      # topics are ecv1/{thing}/ModbusAdapter/{instance}/.... Supply the non-device level values in
      # `identity`; the last level (device) is always the resolved thing name and must NOT be set.
      # hierarchy:
      #   levels: ["site", "area", "line", "device"]
      # identity:
      #   site: "dallas"
      #   area: "packaging"
      #   line: "line-3"
      metricEmission:
        target: "log"
        targetConfig:
          logFileName: "/greengrass/v2/logs/{ComponentFullName}.metric.log"
      component:
        global:
          defaults: { pollIntervalMs: 1000, publishMode: "onChange", maxGap: 8 }
        # Sample instance — override connection.host/port + pollGroups for your device at deploy time.
        instances:
          - id: "plc1"
            adapter: "modbus"
            connection: { transport: "tcp", host: "127.0.0.1", port: 5020, unitId: 1, timeoutMs: 1000 }
            # Data updates publish on the UNS data class (ecv1/{device}/ModbusAdapter/plc1/data/{signal});
            # on-demand read/write/control ride the command inbox (cmd class). No topic templates.
            publish: { batchMs: 0 }
            write: { enabled: true }
            pollGroups:
              - id: "main"
                pollIntervalMs: 1000
                signals:
                  - { name: "Counter16", table: "holding", address: 0, type: "uint16" }
                  - { name: "Scaled", table: "holding", address: 40, type: "uint16", scale: 0.1 }
    accessControl:
      aws.greengrass.ipc.pubsub:
        "com.mbreissi.modbus.ModbusAdapter:ipc:1":
          policyDescription: Allows access to publish/subscribe to all topics on IPC
          operations:
            - "aws.greengrass#PublishToTopic"
            - "aws.greengrass#SubscribeToTopic"
          resources:
            - "*"
      aws.greengrass.ipc.mqttproxy:
        "com.mbreissi.modbus.ModbusAdapter:iotcore:1":
          policyDescription: Allows access to publish/subscribe to all topics on IoT Core.
          operations:
            - "aws.greengrass#PublishToIoTCore"
            - "aws.greengrass#SubscribeToIoTCore"
          resources:
            - "*"
Manifests:
  - Platform:
      os: all
    Artifacts:
      - URI: "s3://BUCKET_NAME/COMPONENT_NAME/COMPONENT_VERSION/ModbusAdapter.zip"
        Unarchive: ZIP
    Lifecycle:
      # Installs into a venv under the (ggc_user-owned) work dir — no elevated privilege needed.
      install:
        Script: |-
          set -e
          COMPONENT_DIR="{work:path}"
          python3 -m venv "$COMPONENT_DIR/venv"
          . $COMPONENT_DIR/venv/bin/activate
          pip3 install --upgrade pip
          # Install the bundled ggcommons wheel first (it is not on public PyPI), then the rest;
          # greengrass-commons in requirements.txt is then already satisfied and skipped.
          pip3 install {artifacts:decompressedPath}/ModbusAdapter/greengrass_commons-*.whl
          pip3 install -r {artifacts:decompressedPath}/ModbusAdapter/requirements.txt
          deactivate
      Run:
        Script: |-
          set -e
          COMPONENT_DIR="{work:path}"
          . $COMPONENT_DIR/venv/bin/activate
          python3 -u {artifacts:decompressedPath}/ModbusAdapter/main.py --platform GREENGRASS
