# Minimal Kubernetes Deployment for the Modbus adapter. With --platform auto the library detects
# KUBERNETES from the ServiceAccount token; config source -> CONFIGMAP (the mounted ConfigMap),
# transport -> MQTT (broker from the config), identity -> Downward API — so NO args needed.
# Build ./Dockerfile and push, or `kind load docker-image`, then set `image:` below.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: modbus-adapter
  labels:
    app.kubernetes.io/name: modbus-adapter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: modbus-adapter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: modbus-adapter
    spec:
      automountServiceAccountToken: true   # the projected SA token is the platform=KUBERNETES signal
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
      containers:
        - name: component
          image: REPLACE_ME   # e.g. ghcr.io/<owner>/modbus-adapter:latest (build ./Dockerfile)
          imagePullPolicy: IfNotPresent
          env:
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            - name: POD_NAMESPACE
              valueFrom: { fieldRef: { fieldPath: metadata.namespace } }
            - name: NODE_NAME
              valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
          ports:
            - { name: health, containerPort: 8081 }
            - { name: metrics, containerPort: 9090 }
          startupProbe:
            httpGet: { path: /startupz, port: health }
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet: { path: /livez, port: health }
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /readyz, port: health }
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: config, mountPath: /etc/ggcommons, readOnly: true }   # WHOLE volume (hot-reload)
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: config
          configMap: { name: modbus-adapter-config }
        - name: tmp
          emptyDir: {}
