# Component config for Kubernetes, mounted as a DIRECTORY at /etc/edgecommons so the CONFIGMAP source
# watches the kubelet ..data swap and hot-reloads in-process. Point connection.host at your Modbus
# device/gateway Service and messaging.local.host at your in-cluster broker. `kubectl apply -f k8s/`
# to drive a hot reload.
apiVersion: v1
kind: ConfigMap
metadata:
  name: modbus-adapter-config
  labels:
    app.kubernetes.io/name: modbus-adapter
data:
  config.json: |-
    {
      "logging": { "level": "INFO" },
      "metricEmission": { "target": "prometheus", "targetConfig": { "port": 9090, "path": "/metrics" } },
      "messaging": {
        "local": { "type": "mqtt", "host": "emqx.default.svc.cluster.local", "port": 1883, "clientId": "modbus-adapter" }
      },
      "component": {
        "token": "modbus-adapter",
        "global": { "defaults": { "pollIntervalMs": 1000, "publishMode": "onChange", "maxGap": 8 } },
        "instances": [
          {
            "id": "plc1",
            "adapter": "modbus",
            "connection": { "transport": "tcp", "host": "modbus-sim.default.svc.cluster.local", "port": 5020, "unitId": 1, "timeoutMs": 1000 },
            "publish": { "batchMs": 0 },
            "writes": { "allow": [] },
            "pollGroups": [
              { "id": "main", "pollIntervalMs": 1000,
                "signals": [
                  { "name": "Counter16", "table": "holding", "address": 0, "type": "uint16" },
                  { "name": "Scaled", "table": "holding", "address": 40, "type": "uint16", "scale": 0.1 }
                ] }
            ]
          }
        ]
      }
    }
